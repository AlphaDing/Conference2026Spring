        const SYNTHESIS = [
          {
            id: "surprise",
            question: "What was the single most surprising thing you heard today?",
            hint: "Surprise = information value. If nothing surprised you, you already knew everything.",
          },
          {
            id: "thesis_stronger",
            question: "Which of your existing theses got STRONGER today? Be specific.",
            hint: "e.g., '国产替代 thesis stronger because 黄山 showed 30% domestic chip ratio, up from 10% last year'",
          },
          {
            id: "thesis_weaker",
            question: "Which of your existing theses got WEAKER today? Be specific.",
            hint: "e.g., 'Consumption recovery thesis weaker because 海闻 flagged ongoing household deleveraging'",
          },
          {
            id: "involution_verdict",
            question: "反内卷: Is it a coherent cross-sector policy regime shift or just a label?",
            hint: "You heard 3 sessions on this. What's your verdict? Does it hold together?",
          },
          {
            id: "unasked_question",
            question: "What question do you wish you had asked? Bring it to Day 2.",
            hint: "Write the specific question and which Day 2 session it's relevant for.",
          },
          {

            question: "Based on today, should you adjust your Day 2 priorities?",
            hint: "Any session that became more/less important based on what you learned today?",

        // =============================================
        // MAIN COMPONENT
        // =============================================

        function ConferenceNotes() {
          const [currentSession, setCurrentSession] = useState(0);
          const [showSynthesis, setShowSynthesis] = useState(false);
          const [notes, setNotes] = useState(() => {
            const init = {};
            SESSIONS.forEach(s => {
              init[s.id] = {
                signals: {},
                checks: {},
                freeNotes: "",
              };
            });
            init._synthesis = {};
            return init;
          });

          const session = SESSIONS[currentSession];

          const setSignal = useCallback((sessionId, signalId, value) => {
            setNotes(prev => ({
              ...prev,
              [sessionId]: {
                ...prev[sessionId],
                signals: { ...prev[sessionId].signals, [signalId]: value },
              },
            }));
          }, []);

          const toggleCheck = useCallback((sessionId, checkId) => {
            setNotes(prev => ({
              ...prev,
              [sessionId]: {
                ...prev[sessionId],
                checks: { ...prev[sessionId].checks, [checkId]: !prev[sessionId].checks[checkId] },
              },
            }));
          }, []);

          const setFreeNote = useCallback((sessionId, text) => {
            setNotes(prev => ({
              ...prev,
              [sessionId]: { ...prev[sessionId], freeNotes: text },
            }));
          }, []);

          const setSynthesisNote = useCallback((qId, text) => {
            setNotes(prev => ({
              ...prev,
              _synthesis: { ...prev._synthesis, [qId]: text },
            }));
          }, []);

          const completionCount = useCallback((sId) => {
            const sNotes = notes[sId];
            if (!sNotes) return 0;
            const signalCount = Object.keys(sNotes.signals).length;
            const checkCount = Object.values(sNotes.checks).filter(Boolean).length;
            const hasNotes = sNotes.freeNotes?.length > 0 ? 1 : 0;
            return signalCount + checkCount + hasNotes;
          }, [notes]);

          return (
            <div style={{
              fontFamily: "'DM Sans', 'Noto Sans SC', sans-serif",
              background: "var(--bg)",
              color: "var(--text)",
              minHeight: "100vh",
              maxWidth: 480,
              margin: "0 auto",
              padding: "0 0 100px 0",
            }}>
              <style>{`
                :root { --bg: #0a0a0f; --text: #e8e6e3; --card: #141419; --card-hover: #1c1c24; --border: #2a2a35; --muted: #6b6b7b; --accent: #E63946; }
                @media (prefers-color-scheme: light) { :root { --bg: #f7f6f3; --text: #1a1a2e; --card: #ffffff; --card-hover: #f0eeeb; --border: #e0ddd8; --muted: #8a8a9a; --accent: #E63946; } }
                * { box-sizing: border-box; margin: 0; padding: 0; }
                textarea { font-family: inherit; }
                .spectrum-track { position: relative; height: 36px; background: var(--card); border-radius: 18px; border: 1.5px solid var(--border); display: flex; align-items: center; cursor: pointer; overflow: hidden; }
                .spectrum-fill { position: absolute; left: 0; top: 0; bottom: 0; border-radius: 18px; transition: width 0.15s; }
                .spectrum-labels { display: flex; justify-content: space-between; font-size: 10.5px; color: var(--muted); padding: 2px 4px 0; }
                .multi-option { display: inline-flex; align-items: center; gap: 5px; padding: 7px 12px; border-radius: 20px; font-size: 12px; border: 1.5px solid var(--border); background: var(--card); color: var(--text); cursor: pointer; transition: all 0.12s; }
                .multi-option.active { border-color: var(--accent); background: #E6394615; color: var(--accent); }
                .check-item { display: flex; gap: 10px; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
                .check-item:last-child { border-bottom: none; }
                .check-box { width: 22px; height: 22px; border-radius: 6px; border: 2px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; transition: all 0.12s; margin-top: 1px; }
                .check-box.checked { border-color: var(--accent); background: var(--accent); color: white; }
                .check-text { font-size: 13px; line-height: 1.45; }
                .check-text.checked { text-decoration: line-through; opacity: 0.5; }
                .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg); border-top: 1px solid var(--border); padding: 8px 12px; display: flex; gap: 6px; overflow-x: auto; z-index: 100; -webkit-overflow-scrolling: touch; }
                .nav-pill { flex-shrink: 0; padding: 6px 12px; border-radius: 16px; font-size: 11px; font-weight: 600; border: 1.5px solid var(--border); background: var(--card); color: var(--muted); cursor: pointer; white-space: nowrap; transition: all 0.12s; position: relative; }
                .nav-pill.active { border-color: var(--accent); color: var(--accent); background: #E6394610; }
                .nav-pill .badge { position: absolute; top: -4px; right: -4px; background: var(--accent); color: white; font-size: 9px; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
                .section-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; margin-top: 20px; }
              `}</style>

              <div style={{ padding: "16px 16px 0", position: "sticky", top: 0, background: "var(--bg)", zIndex: 50, borderBottom: "1px solid var(--border)", paddingBottom: 12 }}>
                <div style={{ fontSize: 11, color: "var(--accent)", fontWeight: 700, letterSpacing: 0.5 }}>DAY 1 · MARCH 24</div>
                <div style={{ fontSize: 17, fontWeight: 700, marginTop: 2 }}>
                  {showSynthesis ? "End-of-Day Synthesis" : session.title}
                </div>
                <div style={{ fontSize: 12, color: "var(--muted)", marginTop: 2 }}>
                  {showSynthesis ? "15 minutes before sleep" : `${session.time} · ${session.speaker}`}
                </div>
              </div>

              <div style={{ padding: "0 16px" }}>
                {showSynthesis ? (
                  <>
                    <div style={{ fontSize: 13, color: "var(--muted)", lineHeight: 1.55, marginTop: 16, padding: "10px 12px", background: "var(--card)", borderRadius: 8, border: "1px solid var(--border)" }}>
                      Before you sleep: spend 15 minutes on these. The act of writing forces synthesis. Your Day 2 will be sharper for it.
                    </div>
                    {SYNTHESIS.map(q => (
                      <div key={q.id} style={{ marginTop: 20 }}>
                        <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 4, lineHeight: 1.4 }}>{q.question}</div>
                        <div style={{ fontSize: 11, color: "var(--muted)", marginBottom: 8 }}>{q.hint}</div>
                        <textarea
                          value={notes._synthesis[q.id] || ""}
                          onChange={e => setSynthesisNote(q.id, e.target.value)}
                          placeholder="Write here..."
                          style={{
                            width: "100%", minHeight: 80, padding: 12, borderRadius: 8,
                            border: "1.5px solid var(--border)", background: "var(--card)",
                            color: "var(--text)", fontSize: 13, lineHeight: 1.5, resize: "vertical",
                          }}
                        />
                      </div>
                    ))}
                  </>
                ) : (
                  <>
                    <div style={{
                      marginTop: 16, padding: "10px 12px", background: "var(--card)",
                      borderRadius: 8, border: "1px solid var(--border)",
                      fontSize: 12.5, lineHeight: 1.55, color: "var(--muted)",
                    }}>
                      {session.context}
                    </div>

                    <div className="section-label">Signal Tracking</div>
                    {session.signals.map(sig => (
                      <div key={sig.id} style={{ marginBottom: 16 }}>
                        <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 2 }}>{sig.label}</div>
                        <div style={{ fontSize: 10.5, color: "var(--muted)", marginBottom: 6 }}>{sig.note}</div>

                        {sig.type === "spectrum" && (
                          <>
                            <div
                              className="spectrum-track"
                              onClick={(e) => {
                                const rect = e.currentTarget.getBoundingClientRect();
                                const x = e.clientX - rect.left;
                                const pct = Math.max(0, Math.min(100, (x / rect.width) * 100));
                                setSignal(session.id, sig.id, Math.round(pct));
                              }}
                            >
                              <div
                                className="spectrum-fill"
                                style={{
                                  width: `${notes[session.id]?.signals[sig.id] ?? 50}%`,
                                  background: `linear-gradient(90deg, #2D6A4F, #E63946)`,
                                  opacity: notes[session.id]?.signals[sig.id] !== undefined ? 0.3 : 0.08,
                                }}
                              />
                              {notes[session.id]?.signals[sig.id] !== undefined && (
                                <div style={{
                                  position: "absolute",
                                  left: `${notes[session.id].signals[sig.id]}%`,
                                  transform: "translateX(-50%)",
                                  width: 14, height: 14, borderRadius: "50%",
                                  background: "var(--text)", border: "2px solid var(--bg)",
                                }} />
                              )}
                            </div>
                            <div className="spectrum-labels">
                              <span>{sig.left}</span>
                              <span>{sig.right}</span>
                            </div>
                          </>
                        )}

                        {sig.type === "multi" && (
                          <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                            {sig.options.map(opt => {
                              const selected = (notes[session.id]?.signals[sig.id] || []).includes(opt);
                              return (
                                <div
                                  key={opt}
                                  className={`multi-option ${selected ? "active" : ""}`}
                                  onClick={() => {
                                    const current = notes[session.id]?.signals[sig.id] || [];
                                    const next = selected ? current.filter(o => o !== opt) : [...current, opt];
                                    setSignal(session.id, sig.id, next);
                                  }}
                                >
                                  {opt}
                                </div>
                              );
                            })}
                          </div>
                        )}

                        {sig.type === "text" && (
                          <input
                            type="text"
                            value={notes[session.id]?.signals[sig.id] || ""}
                            onChange={e => setSignal(session.id, sig.id, e.target.value)}
                            placeholder="Fill in when revealed..."
                            style={{
                              width: "100%", padding: "8px 12px", borderRadius: 8,
                              border: "1.5px solid var(--border)", background: "var(--card)",
                              color: "var(--text)", fontSize: 13,
                            }}
                          />
                        )}
                      </div>
                    ))}

                    <div className="section-label">Listen For</div>
                    <div style={{ background: "var(--card)", borderRadius: 10, border: "1px solid var(--border)", padding: "4px 14px" }}>
                      {session.listenFor.map(item => {
                        const checked = notes[session.id]?.checks[item.id] || false;
                        return (
                          <div key={item.id} className="check-item" onClick={() => toggleCheck(session.id, item.id)}>
                            <div className={`check-box ${checked ? "checked" : ""}`}>
                              {checked && "✓"}
                            </div>
                            <div className={`check-text ${checked ? "checked" : ""}`}>{item.text}</div>
                          </div>
                        );
                      })}
                    </div>

                    {session.freeNote && (
                      <>
                        <div className="section-label">Live Notes</div>
                        <textarea
                          value={notes[session.id]?.freeNotes || ""}
                          onChange={e => setFreeNote(session.id, e.target.value)}
                          placeholder="Off-slide comments, verbatim quotes, audience reactions..."
                          style={{
                            width: "100%", minHeight: 100, padding: 12, borderRadius: 10,
                            border: "1.5px solid var(--border)", background: "var(--card)",
                            color: "var(--text)", fontSize: 13, lineHeight: 1.5, resize: "vertical",
                          }}
                        />
                      </>
                    )}
                  </>
                )}
              </div>

              <div className="nav-bar">
                {SESSIONS.map((s, i) => {
                  const count = completionCount(s.id);
                  return (
                    <div
                      key={s.id}
                      className={`nav-pill ${!showSynthesis && currentSession === i ? "active" : ""}`}
                      onClick={() => { setCurrentSession(i); setShowSynthesis(false); }}
                    >
                      {s.time.split("-")[0]}
                      {count > 0 && <span className="badge">{count}</span>}
                    </div>
                  );
                })}
                <div
                  className={`nav-pill ${showSynthesis ? "active" : ""}`}
                  style={{ background: showSynthesis ? "#E6394615" : undefined }}
                  onClick={() => setShowSynthesis(true)}
                >
                  📝 Synthesis
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ConferenceNotes />);
    </script>
</body>
</html>
