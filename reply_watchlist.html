              font-weight: 700;
              opacity: 0.12;
              position: absolute;
              right: 16px;
              top: 12px;
              font-variant-numeric: tabular-nums;
            }

            .meta-row {
              display: flex;
              align-items: center;
              gap: 8px;
              margin-bottom: 8px;
              flex-wrap: wrap;
            }
            .date-badge {
              font-size: 10.5px;
              font-weight: 700;
              padding: 2px 7px;
              border-radius: 4px;
              background: var(--border);
            }
            .time-text {
              font-size: 11.5px;
              color: var(--muted);
              font-variant-numeric: tabular-nums;
            }
            .track-text {
              font-size: 10.5px;
              color: var(--muted);
            }
            .horizon-badge {
              font-size: 10px;
              font-weight: 600;
              padding: 2px 7px;
              border-radius: 10px;
              border: 1px solid;
              margin-left: auto;
            }

            .title-text {
              font-size: 15px;
              font-weight: 600;
              line-height: 1.4;
              margin-bottom: 4px;
              padding-right: 40px;
            }
            .speaker-text {
              font-size: 12px;
              color: var(--muted);
              line-height: 1.4;
              margin-bottom: 0;
            }
            .reason-text {
              font-size: 12.5px;
              line-height: 1.6;
              color: var(--text);
              opacity: 0.85;
              margin-top: 12px;
              padding-top: 12px;
              border-top: 1px solid var(--border);
            }
            .fw-tag {
              display: inline-flex;
              align-items: center;
              gap: 4px;
              font-size: 10px;
              font-weight: 600;
              padding: 2px 8px;
              border-radius: 4px;
              opacity: 0.8;
            }
            .tier-divider {
              padding: 20px 0 12px;
              border-bottom: 2px solid var(--border);
              margin-bottom: 14px;
            }
            .tier-divider h2 {
              font-size: 14px;
              font-weight: 700;
              letter-spacing: 1px;
              margin-bottom: 4px;
            }
            .tier-divider p {
              font-size: 12px;
              color: var(--muted);
            }
            .stats-bar {
              display: flex;
              gap: 16px;
              padding: 14px 0;
              border-bottom: 1px solid var(--border);
              margin-bottom: 16px;
            }
            .stat-item {
              display: flex;
              flex-direction: column;
              gap: 2px;
            }
            .stat-value {
              font-size: 20px;
              font-weight: 700;
            }
            .stat-label {
              font-size: 10px;
              color: var(--muted);
              text-transform: uppercase;
              letter-spacing: 0.5px;
            }
            .clear-link {
              font-size: 11px;
              color: var(--muted);
              cursor: pointer;
              text-decoration: underline;
              text-underline-offset: 2px;
            }
            .clear-link:hover { color: var(--text); }
          `}</style>

          <h1 style={{ fontSize: 20, fontWeight: 700, marginBottom: 4, lineHeight: 1.3 }}>
            Replay Watchlist — Ranked
          </h1>
          <p style={{ fontSize: 12.5, color: "var(--muted)", lineHeight: 1.5, marginBottom: 16 }}>
            30 sessions ranked by priority. At 1.5× speed (~23 min each), that's ~{(30 * 23 / 60).toFixed(0)} hours total.
          </p>

          <div className="stats-bar">
            <div className="stat-item">
              <span className="stat-value">{filtered.length}</span>
              <span className="stat-label">Sessions</span>
            </div>
            <div className="stat-item">
              <span className="stat-value">~{totalHours}h</span>
              <span className="stat-label">at 1.5× speed</span>
            </div>
            <div className="stat-item">
              <span className="stat-value">{filtered.filter(s => s.tier === 1).length}</span>
              <span className="stat-label">Urgent (3 days)</span>
            </div>
            <div className="stat-item">
              <span className="stat-value">{filtered.filter(s => s.horizon.includes("5") || s.horizon.includes("10")).length}</span>
              <span className="stat-label">Long-horizon</span>
            </div>
          </div>

          {/* Tier filters */}
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 12 }}>
            {[1, 2, 3].map(tier => (
              <button
                key={tier}
                className={`tier-btn ${selectedTier === tier ? "active" : ""}`}
                style={selectedTier === tier ? { color: TIER_LABELS[tier].color, borderColor: TIER_LABELS[tier].color } : {}}
                onClick={() => setSelectedTier(selectedTier === tier ? null : tier)}
              >
                <span style={{ width: 8, height: 8, borderRadius: "50%", background: TIER_LABELS[tier].color }} />
                {TIER_LABELS[tier].label}
                <span style={{ opacity: 0.5 }}>{tierCounts[tier]}</span>
              </button>
            ))}
          </div>

          {/* Framework filters */}
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 8 }}>
            {Object.entries(FRAMEWORK_LABELS).map(([key, fw]) => (
              <button
                key={key}
                className={`fw-chip ${selectedFramework === key ? "active" : ""}`}
                style={selectedFramework === key ? { color: fw.color, borderColor: fw.color } : {}}
                onClick={() => setSelectedFramework(selectedFramework === key ? null : key)}
              >
                {fw.icon} {fw.label} ({fwCounts[key] || 0})
              </button>
            ))}
            {(selectedTier || selectedFramework) && (
              <span className="clear-link" onClick={() => { setSelectedTier(null); setSelectedFramework(null); }}>
                Clear filters
              </span>
            )}
          </div>

          {/* Sessions list */}
          <div style={{ marginTop: 16 }}>
            {(() => {
              let lastTier = null;
              return filtered.map(session => {
                const showDivider = session.tier !== lastTier;
                lastTier = session.tier;
                const tierInfo = TIER_LABELS[session.tier];
                const fwInfo = FRAMEWORK_LABELS[session.framework];
                const hColor = HORIZON_COLORS[session.horizon] || "var(--muted)";
                const isExpanded = expandedId === session.id;

                return (
                  <div key={session.id}>
                    {showDivider && !selectedTier && (
                      <div className="tier-divider">
                        <h2 style={{ color: tierInfo.color }}>{tierInfo.label}</h2>
                        <p>{tierInfo.desc}</p>
                      </div>
                    )}
                    <div
                      className="replay-card"
                      style={{ "--accent": tierInfo.color }}
                      onClick={() => setExpandedId(isExpanded ? null : session.id)}
                    >
                      <div style={{
                        position: "absolute", left: 0, top: 0, bottom: 0, width: 3,
                        background: tierInfo.color, opacity: 0.7,
                      }} />
                      <span className="rank-num" style={{ color: tierInfo.color }}>
                        {String(session.rank).padStart(2, "0")}
                      </span>

                      <div className="meta-row">
                        <span className="date-badge">{session.date}</span>
                        <span className="time-text">{session.time}</span>
                        <span className="track-text">{session.track}</span>
                        <span
                          className="fw-tag"
                          style={{ background: fwInfo.color + "18", color: fwInfo.color }}
                        >
                          {fwInfo.icon} {fwInfo.label}
                        </span>
                        <span
                          className="horizon-badge"
                          style={{ color: hColor, borderColor: hColor + "60" }}
                        >
                          {session.horizon}
                        </span>
                      </div>

                      <div className="title-text">{session.title}</div>
                      <div className="speaker-text">{session.speaker}</div>

                      {isExpanded && (
                        <div className="reason-text">{session.reason}</div>
                      )}
                    </div>
                  </div>
                );
              });
            })()}
          </div>

          <div style={{
            marginTop: 24, padding: 16, background: "var(--card)",
            border: "1px solid var(--border)", borderRadius: 10,
            fontSize: 12.5, lineHeight: 1.6, color: "var(--muted)",
          }}>
            <strong style={{ color: "var(--text)" }}>Watching schedule suggestion:</strong><br />
            Week 1 (Days 1-3 post-conference): Tier 1 sessions — 7 replays, ~2.7 hours. These are the ones where information decays fastest and market positioning happens.<br />
            Week 1 (Days 4-7): Tier 2 sessions — 12 replays, ~4.6 hours. Blind spots and thesis stress tests while the conference context is still fresh in your mind.<br />
            Week 2: Tier 3 sessions — 11 replays, ~4.2 hours. Long-term conviction building. Watch these when you have mental space to think, not between meetings.
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ReplayWatchlist />);
  </script>
</body>
</html>
