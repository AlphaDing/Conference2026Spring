      fund_manager: { label: "基金经理实操 Fund Managers", color: "#D8F3DC", group: "Markets & Investing" },
      commodities: { label: "大宗商品 Commodities", color: "#1B4332", group: "Markets & Investing" },

      // Real Economy & Sectors
      consumption: { label: "消费复苏 Consumption", color: "#FF6B6B", group: "Real Economy" },
      property: { label: "房地产 Property", color: "#EE6C4D", group: "Real Economy" },
      pharma: { label: "医药出海 Pharma Global", color: "#F4845F", group: "Real Economy" },
      ev: { label: "新能源车/智驾 EV & Auto", color: "#F7A072", group: "Real Economy" },
      manufacturing: { label: "制造业 Manufacturing", color: "#F7B267", group: "Real Economy" },
      china_going_global: { label: "中资出海 Going Global", color: "#FFC857", group: "Real Economy" },
      brand: { label: "品牌/美妆 Brand", color: "#FFE066", group: "Real Economy" },

      // Other
      us_tech: { label: "美国科技 US Tech", color: "#118AB2", group: "Cross-Pacific" },
      supply_chain: { label: "产业链重构 Supply Chain", color: "#073B4C", group: "Cross-Pacific" },
      europe: { label: "欧洲 Europe", color: "#264653", group: "Cross-Pacific" },

      // Sector-specific
      telecom: { label: "通信 Telecom", color: "#8D99AE", group: "Sectors" },
      banking: { label: "银行 Banking", color: "#457B9D", group: "Sectors" },
      financials: { label: "金融 Financials", color: "#2A6F97", group: "Sectors" },
      wealth_mgmt: { label: "财富管理 Wealth Mgmt", color: "#014F86", group: "Sectors" },
      utilities: { label: "公用事业 Utilities", color: "#01497C", group: "Sectors" },
      logistics: { label: "交运/快递 Logistics", color: "#013A63", group: "Sectors" },
      defense: { label: "军工 Defense", color: "#012A4A", group: "Sectors" },
      materials: { label: "材料 Materials", color: "#468FAF", group: "Sectors" },
      dividends: { label: "高分红 Dividends", color: "#61A5C2", group: "Sectors" },
      software: { label: "软件 Software", color: "#89C2D9", group: "Sectors" },
      media_content: { label: "内容/游戏 Media", color: "#A9D6E5", group: "Sectors" },
      ipo_market: { label: "IPO市场", color: "#CAF0F8", group: "Sectors" },
      tech_policy: { label: "科技政策支持", color: "#ADE8F4", group: "Sectors" },
    };

    const GROUPS_ORDER = [
      "Macro & Policy",
      "AI & Compute",
      "Power & Energy",
      "Frontier Tech",
      "Markets & Investing",
      "Real Economy",
      "Cross-Pacific",
      "Sectors",
    ];

    const GROUP_COLORS = {
      "Macro & Policy": "#E63946",
      "AI & Compute": "#7209B7",
      "Power & Energy": "#F77F00",
      "Frontier Tech": "#2EC4B6",
      "Markets & Investing": "#2D6A4F",
      "Real Economy": "#FF6B6B",
      "Cross-Pacific": "#118AB2",
      "Sectors": "#8D99AE",
    };

    function SessionCard({ session, selectedThemes, score, maxScore }) {
      const pct = maxScore > 0 ? score / maxScore : 0;

      return (
        <div className="session-card">
          <div className="session-meta">
            <span className="session-date">{session.date}</span>
            <span className="session-time">{session.time}</span>
            <span className="session-track">{session.track}</span>
          </div>
          <div className="session-title">{session.title}</div>
          <div className="session-speaker">{session.speaker}</div>
          <div className="session-themes">
            {session.themes.map(t => {
              const def = THEME_DEFS[t];
              if (!def) return null;
              const isMatched = selectedThemes.has(t);
              return (
                <div
                  key={t}
                  title={def.label}
                  className={`session-theme-dot ${isMatched ? "matched" : ""}`}
                  style={{ backgroundColor: def.color }}
                />
              );
            })}
          </div>
          {score > 1 && (
            <div
              className="match-bar"
              style={{
                width: `${pct * 100}%`,
                background: `linear-gradient(90deg, #E63946, #7209B7)`,
              }}
            />
          )}
        </div>
      );
    }

    function ConferenceRethemed() {
      const [selectedThemes, setSelectedThemes] = useState(new Set());
      const [viewMode, setViewMode] = useState("themes"); // "themes" or "timeline"
      const [expandedGroup, setExpandedGroup] = useState(null);

      const themesByGroup = useMemo(() => {
        const map = {};
        for (const [key, def] of Object.entries(THEME_DEFS)) {
          if (!map[def.group]) map[def.group] = [];
          // count sessions
          const count = ALL_SESSIONS.filter(s => s.themes.includes(key)).length;
          map[def.group].push({ key, ...def, count });
        }
        // sort each group by count desc
        for (const g of Object.keys(map)) {
          map[g].sort((a, b) => b.count - a.count);
        }
        return map;
      }, []);

      const filteredSessions = useMemo(() => {
        if (selectedThemes.size === 0) return [];
        return ALL_SESSIONS.filter(s =>
          s.themes.some(t => selectedThemes.has(t))
        ).sort((a, b) => {
          const dateA = a.date.replace("/", "");
          const dateB = b.date.replace("/", "");
          if (dateA !== dateB) return dateA.localeCompare(dateB);
          return a.time.localeCompare(b.time);
        });
      }, [selectedThemes]);

      const toggleTheme = (key) => {
        setSelectedThemes(prev => {
          const next = new Set(prev);
          if (next.has(key)) next.delete(key);
          else next.add(key);
          return next;
        });
      };

      const selectGroup = (group) => {
        const keys = themesByGroup[group].map(t => t.key);
        const allSelected = keys.every(k => selectedThemes.has(k));
        setSelectedThemes(prev => {
          const next = new Set(prev);
          if (allSelected) {
            keys.forEach(k => next.delete(k));
          } else {
            keys.forEach(k => next.add(k));
          }
          return next;
        });
      };

      const clearAll = () => setSelectedThemes(new Set());

      // For timeline view, group by date+time slot
      const timelineGroups = useMemo(() => {
        if (filteredSessions.length === 0) return {};
        const groups = {};
        for (const s of filteredSessions) {
          const key = s.date;
          if (!groups[key]) groups[key] = [];
          groups[key].push(s);
        }
        return groups;
      }, [filteredSessions]);

      const matchScore = (session) => {
        return session.themes.filter(t => selectedThemes.has(t)).length;
      };

      return (
        <div style={{
          fontFamily: "'DM Sans', 'Noto Sans SC', sans-serif",
          background: "var(--bg, #0a0a0f)",
          color: "var(--text, #e8e6e3)",
          minHeight: "100vh",
          padding: "24px 16px",
          maxWidth: 900,
          margin: "0 auto",
        }}>
          <style>{`
            :root {
              --bg: #0a0a0f;
              --text: #e8e6e3;
              --card: #141419;
              --card-hover: #1c1c24;
              --border: #2a2a35;
              --muted: #6b6b7b;
            }
            @media (prefers-color-scheme: light) {
              :root {
                --bg: #f7f6f3;
                --text: #1a1a2e;
                --card: #ffffff;
                --card-hover: #f0eeeb;
                --border: #e0ddd8;
                --muted: #8a8a9a;
              }
            }
            * { box-sizing: border-box; }
            .theme-chip {
              display: inline-flex;
              align-items: center;
              gap: 6px;
              padding: 6px 12px;
              border-radius: 20px;
              font-size: 12.5px;
              font-weight: 500;
              cursor: pointer;
              transition: all 0.15s ease;
              border: 1.5px solid var(--border);
              background: var(--card);
              color: var(--text);
              white-space: nowrap;
            }
            .theme-chip:hover { background: var(--card-hover); }
            .theme-chip.active {
              border-color: currentColor;
              box-shadow: 0 0 0 1px currentColor;
            }
            .theme-chip .count {
              font-size: 10px;
              opacity: 0.5;
              font-weight: 400;
            }
            .group-header {
              display: flex;
              align-items: center;
              gap: 10px;
              padding: 10px 0;
              cursor: pointer;
              user-select: none;
            }
            .group-header:hover .group-name { opacity: 0.8; }
            .group-dot {
              width: 10px;
              height: 10px;
              border-radius: 50%;
              flex-shrink: 0;
            }
            .group-name {
              font-size: 13px;
              font-weight: 700;
              letter-spacing: 0.5px;
              text-transform: uppercase;
            }
            .group-count {
              font-size: 11px;
              color: var(--muted);
              margin-left: auto;
            }
            .session-card {
              background: var(--card);
              border: 1px solid var(--border);
              border-radius: 10px;
              padding: 14px 16px;
              margin-bottom: 8px;
              transition: all 0.15s ease;
            }
            .session-card:hover { background: var(--card-hover); }
            .session-meta {
              display: flex;
              align-items: center;
              gap: 8px;
              margin-bottom: 6px;
              flex-wrap: wrap;
            }
            .session-date {
              font-size: 11px;
              font-weight: 700;
              padding: 2px 8px;
              border-radius: 4px;
              background: var(--border);
              color: var(--text);
            }
            .session-time {
              font-size: 12px;
              color: var(--muted);
              font-variant-numeric: tabular-nums;
            }
            .session-track {
              font-size: 10.5px;
              color: var(--muted);
              margin-left: auto;
            }
            .session-title {
              font-size: 14.5px;
              font-weight: 600;
              margin-bottom: 4px;
              line-height: 1.4;
            }
            .session-speaker {
              font-size: 12px;
              color: var(--muted);
              line-height: 1.4;
            }
            .session-themes {
              display: flex;
              gap: 4px;
              flex-wrap: wrap;
              margin-top: 8px;
            }
            .session-theme-dot {
              width: 8px;
              height: 8px;
              border-radius: 50%;
              opacity: 0.7;
            }
            .session-theme-dot.matched {
              opacity: 1;
              box-shadow: 0 0 4px currentColor;
            }
            .match-bar {
              height: 3px;
              border-radius: 2px;
              margin-top: 10px;
              opacity: 0.6;
            }
            .day-divider {
              font-size: 16px;
              font-weight: 700;
              padding: 20px 0 10px;
              border-bottom: 1px solid var(--border);
              margin-bottom: 12px;
              display: flex;
              align-items: center;
              gap: 10px;
            }
            .day-divider .count-badge {
              font-size: 11px;
              font-weight: 500;
              color: var(--muted);
              background: var(--card);
              padding: 2px 8px;
              border-radius: 10px;
              border: 1px solid var(--border);
            }
            .view-toggle {
              display: flex;
              gap: 0;
              border: 1px solid var(--border);
              border-radius: 8px;
              overflow: hidden;
              margin: 16px 0;
            }
            .view-toggle button {
              flex: 1;
              padding: 8px 16px;
              font-size: 12px;
              font-weight: 600;
              border: none;
              background: var(--card);
              color: var(--muted);
              cursor: pointer;
              transition: all 0.15s;
            }
            .view-toggle button.active {
              background: var(--text);
              color: var(--bg);
            }
            .clear-btn {
              font-size: 11px;
              color: var(--muted);
              background: none;
              border: 1px solid var(--border);
              border-radius: 6px;
              padding: 4px 10px;
              cursor: pointer;
              transition: all 0.15s;
            }
            .clear-btn:hover { color: var(--text); border-color: var(--text); }
            .overlap-warning {
              background: #E6394620;
              border: 1px solid #E6394640;
              border-radius: 8px;
              padding: 10px 14px;
              margin-bottom: 8px;
              font-size: 12px;
              color: #E63946;
            }
          `}</style>

          <div style={{ marginBottom: 24 }}>
            <h1 style={{ fontSize: 22, fontWeight: 700, marginBottom: 4, lineHeight: 1.3 }}>
              国泰海通 2026 春季策略会
            </h1>
            <p style={{ fontSize: 13, color: "var(--muted)", marginBottom: 16, lineHeight: 1.5 }}>
              139 sessions across 25 tracks, re-grouped into cross-cutting themes. Select themes to filter.
            </p>

            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
              <span style={{ fontSize: 12, fontWeight: 600, color: "var(--muted)" }}>
                {selectedThemes.size} themes selected · {filteredSessions.length} sessions
              </span>
              {selectedThemes.size > 0 && <button className="clear-btn" onClick={clearAll}>Clear all</button>}
            </div>

            {GROUPS_ORDER.map(group => {
              const themes = themesByGroup[group] || [];
              const isExpanded = expandedGroup === group;
              const selectedCount = themes.filter(t => selectedThemes.has(t.key)).length;
              return (
                <div key={group} style={{ marginBottom: 4 }}>
                  <div className="group-header" onClick={() => setExpandedGroup(isExpanded ? null : group)}>
                    <div className="group-dot" style={{ background: GROUP_COLORS[group] }} />
                    <span className="group-name" style={{ color: GROUP_COLORS[group] }}>{group}</span>
                    {selectedCount > 0 && (
                      <span style={{ fontSize: 11, color: GROUP_COLORS[group], opacity: 0.7 }}>
                        {selectedCount}/{themes.length}
                      </span>
                    )}
                    <span className="group-count">
                      {themes.reduce((sum, t) => sum + t.count, 0)} mentions · {isExpanded ? "▾" : "▸"}
                    </span>
                  </div>
                  {isExpanded && (
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 6, paddingLeft: 20, paddingBottom: 10 }}>
                      <div
                        className="theme-chip"
                        style={{ borderStyle: "dashed", fontSize: 11 }}
                        onClick={() => selectGroup(group)}
                      >
                        Toggle all
                      </div>
                      {themes.map(t => (
                        <div
                          key={t.key}
                          className={`theme-chip ${selectedThemes.has(t.key) ? "active" : ""}`}
                          style={selectedThemes.has(t.key) ? { color: t.color, borderColor: t.color } : {}}
                          onClick={() => toggleTheme(t.key)}
                        >
                          {t.label} <span className="count">{t.count}</span>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {filteredSessions.length > 0 && (
            <>
              <div className="view-toggle">
                <button className={viewMode === "themes" ? "active" : ""} onClick={() => setViewMode("themes")}>
                  By Relevance
                </button>
                <button className={viewMode === "timeline" ? "active" : ""} onClick={() => setViewMode("timeline")}>
                  By Timeline
                </button>
              </div>

              {viewMode === "timeline" ? (
                Object.entries(timelineGroups).map(([date, sessions]) => {
                  const overlaps = [];
                  for (let i = 0; i < sessions.length; i++) {
                    for (let j = i + 1; j < sessions.length; j++) {
                      const [s1Start] = sessions[i].time.split("-");
                      const [, s1End] = sessions[i].time.split("-");
                      const [s2Start] = sessions[j].time.split("-");
                      if (s2Start < s1End && s1Start < sessions[j].time.split("-")[1]) {
                        overlaps.push([sessions[i].id, sessions[j].id]);
                      }
                    }
                  }
                  const hasOverlaps = overlaps.length > 0;

                  return (
                    <div key={date}>
                      <div className="day-divider">
                        {date === "3/24" ? "Day 1 · 3月24日" : date === "3/25" ? "Day 2 · 3月25日" : "Day 3 · 3月26日"}
                        <span className="count-badge">{sessions.length} sessions</span>
                      </div>
                      {hasOverlaps && (
                        <div className="overlap-warning">
                          ⚠ {overlaps.length} time conflicts — you'll need to choose between parallel sessions
                        </div>
                      )}
                      {sessions.map(s => (
                        <SessionCard key={s.id} session={s} selectedThemes={selectedThemes} score={matchScore(s)} maxScore={selectedThemes.size} />
                      ))}
                    </div>
                  );
                })
              ) : (
                [...filteredSessions]
                  .sort((a, b) => {
                    const scoreA = matchScore(a);
                    const scoreB = matchScore(b);
                    if (scoreB !== scoreA) return scoreB - scoreA;
                    const dateA = a.date.replace("/", "");
                    const dateB = b.date.replace("/", "");
                    if (dateA !== dateB) return dateA.localeCompare(dateB);
                    return a.time.localeCompare(b.time);
                  })
                  .map(s => (
                    <SessionCard key={s.id} session={s} selectedThemes={selectedThemes} score={matchScore(s)} maxScore={selectedThemes.size} />
                  ))
              )}
            </>
          )}

          {selectedThemes.size > 0 && filteredSessions.length === 0 && (
            <div style={{ textAlign: "center", padding: 40, color: "var(--muted)" }}>
              No sessions match the selected themes.
            </div>
          )}

          {selectedThemes.size === 0 && (
            <div style={{ textAlign: "center", padding: 40, color: "var(--muted)", fontSize: 13, lineHeight: 1.6 }}>
              ↑ Expand a group and select themes to see matching sessions.<br />
              Try combining themes across groups to find hidden connections — e.g. "Power Grid" + "AI Infrastructure" reveals the energy bottleneck for AI buildout.
            </div>
          )}
        </div>
      );
    }

    // Mount the React app to the DOM
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ConferenceRethemed />);
  </script>
</body>
</html>
